<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm your account</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 40px; border-radius: 12px; text-align: center;">
        <h1 style="color: white; margin: 0; font-size: 28px;">FLOWSTATE</h1>
    </div>
    <div style="padding: 40px 20px; text-align: center;">
        <h2 style="color: #333; font-size: 24px;">Hey {{.Name}},</h2>
        <p style="color: #666; font-size: 16px; line-height: 1.6;">
            Thanks for signing up! Click the button below to confirm your email address.
        </p>
        <a href="{{.ConfirmURL}}" style="display: inline-block; background: #667eea; color: white; text-decoration: none; padding: 16px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; margin: 24px 0;">
            Confirm Email
        </a>
        <p style="color: #999; font-size: 14px;">
            or copy this link: <span style="word-break: break-all;">{{.ConfirmURL}}</span>
        </p>
        <p style="color: #999; font-size: 14px;">
            This link expires in 24 hours.
        </p>
    </div>
    <div style="text-align: center; padding: 20px; color: #999; font-size: 12px;">
        FLOWSTATE — Productivity without friction
    </div>
</body>
</html>
